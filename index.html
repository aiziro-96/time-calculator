<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>時間計算</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <h1>時間計算</h1>

        <input 
        id="timeInput"
        type="text"
        placeholder="時間を入力 (例: 90 , 90+30)">

        <div class="buttons">
            <button onclick="addMinutes(30)">+30分</button>
            <button onclick="addMinutes(60)">+60分</button>
        </div>

        <p id="result">計算結果</p>

        <button onclick="copyResult()">結果をコピー</button>
        <button onclick="saveHistory()">履歴に追加</button>

        <div class="history-area">
            <h2>    最近使った入力</h2>
            <div id="historyList"></div>
            <button onclick="clearHistory()">履歴をクリア</button>
            <p id="message"></p>
        </div>
    </div>


    <script src="script.js"></script>
</body>
</html>
